<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>競馬予想一覧</title>
</head>
<body>
  <ul id="list"></ul>

  <script>
    const user = "ZunchiLab";
    const repo = "KBA";
    const path = "predictions";

    const api = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;

    fetch(api)
      .then(res => res.json())
      .then(files => {
        const list = document.getElementById("list");

        files
          .filter(file => file.name.endsWith(".html"))
          .sort((a, b) => b.name.localeCompare(a.name)) // 新しい順
          .forEach(file => {
            const li = document.createElement("li");

            // ファイル名加工
            const match = file.name.match(/report_(\d{4})(\d{2})(\d{2})_(\w+)_/);
            let label = file.name;

            if (match) {
              const [_, y, m, d, type] = match;
              label = `${y}-${m}-${d} (${type})`;
            }

            const a = document.createElement("a");
            a.href = `https://${user}.github.io/${repo}/${path}/${file.name}`;
            a.textContent = label;

            li.appendChild(a);
            list.appendChild(li);
          });
      });
  </script>
</body>
</html>
