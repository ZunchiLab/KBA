<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>競馬予想一覧</title>
</head>
<body>
  <ul id="list"></ul>

  <script>
    const user = "ZunchiLab";
    const repo = "KBA";
    const path = "predictions";

    const api = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;

    fetch(api)
      .then(res => res.json())
      .then(files => {
        const list = document.getElementById("list");

        files
          .filter(file => file.name.endsWith(".html"))
          .sort((a, b) => b.name.localeCompare(a.name)) // 新しい順
          .forEach(file => {
            const li = document.createElement("li");

            let label = file.name;

            // report_20260531_JRA_xxx.html
            const reportMatch = file.name.match(
              /report_(\d{4})(\d{2})(\d{2})_(\w+)_/
            );

            // reverse-all-JRA-20260531.html
            const reverseMatch = file.name.match(
              /reverse-all-([A-Za-z0-9]+)-(\d{4})(\d{2})(\d{2})\.html/
            );

            if (reportMatch) {
              const [_, y, m, d, type] = reportMatch;
              label = `${y}-${m}-${d} (${type})`;
            } else if (reverseMatch) {
              const [_, type, y, m, d] = reverseMatch;
              label = `${y}-${m}-${d} (reverse-${type})`;
            }

            const a = document.createElement("a");
            a.href = `https://${user}.github.io/${repo}/${path}/${file.name}`;
            a.textContent = label;

            li.appendChild(a);
            list.appendChild(li);
          });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("list").innerHTML =
          "<li>ファイル一覧の取得に失敗しました。</li>";
      });
  </script>
</body>
</html>
